apiVersion: esgw/v1alpha1
kind: Listener
metadata: {name: web}
spec: {address: 0.0.0.0, port: 8080, protocol: HTTP}
---
apiVersion: esgw/v1alpha1
kind: Route
metadata: {name: api}
spec:
  listeners: [web]
  hostnames: [api.example.com]
  rules:
    - match: {path: {prefix: /}}
      backends: [{upstream: app}]
---
apiVersion: esgw/v1alpha1
kind: Upstream
metadata: {name: app}
spec:
  endpoints: [{address: 127.0.0.1, port: 9000}]

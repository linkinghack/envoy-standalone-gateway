apiVersion: esgw/v1alpha1
kind: Listener
metadata: {name: http}
spec: {port: 80, protocol: HTTP}
---
apiVersion: esgw/v1alpha1
kind: Route
metadata: {name: web}
spec:
  listeners: [http]
  hostnames: [www.example.com]
  rules:
    - match: {path: {prefix: /}}
      backends: [{upstream: app}]
---
apiVersion: esgw/v1alpha1
kind: Upstream
metadata: {name: app}
spec:
  endpoints: [{address: 127.0.0.1, port: 8080}]

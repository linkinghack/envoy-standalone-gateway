# 错误用例：envoyPatch jsonPatch 的 path 指向不存在的字段
# （F4 patch 回转失败 = 编译错误并回指 patch 位置，patch 阶段）。
apiVersion: esgw/v1alpha1
kind: Listener
metadata: {name: http}
spec: {port: 80, protocol: HTTP}
---
apiVersion: esgw/v1alpha1
kind: Route
metadata: {name: api}
spec:
  listeners: [http]
  rules:
    - match: {path: {prefix: /}}
      backends: [{upstream: user-svc}]
---
apiVersion: esgw/v1alpha1
kind: Upstream
metadata: {name: user-svc}
spec:
  endpoints: [{address: 10.0.0.1, port: 8080}]
  envoyPatch:
    - target: cluster
      op: jsonPatch
      value:
        - {op: replace, path: /no_such_field, value: 1}

# 错误用例：Route 引用不存在的 Upstream（F2 悬空引用，link 阶段）。
apiVersion: esgw/v1alpha1
kind: Listener
metadata: {name: http}
spec: {port: 80, protocol: HTTP}
---
apiVersion: esgw/v1alpha1
kind: Route
metadata: {name: api}
spec:
  listeners: [http]
  rules:
    - match: {path: {prefix: /}}
      backends: [{upstream: ghost}]
